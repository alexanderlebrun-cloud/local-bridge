name: Build & Release macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Validate repo matches electron-builder publish config
        run: |
          EXPECTED="alexanderlebrun-cloud/local-bridge"
          if [ "$GITHUB_REPOSITORY" != "$EXPECTED" ]; then
            echo "ERROR: GITHUB_REPOSITORY ($GITHUB_REPOSITORY) does not match expected ($EXPECTED)"
            echo "Update electron-builder.yml publish.owner / publish.repo to match."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build & package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: pnpm package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dmg-builds
          path: dist/*.dmg
